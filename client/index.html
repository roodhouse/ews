<!doctype html>
<html lang="en" class="initial-loading">
  <head>
    <meta charset="UTF-8" />
    <link rel="preload" href="/animation.mp4" as="video" type="video/mp4" fetchpriority="high" />
    <link
      id="background-preload"
      rel="preload"
      href="/backgrounds/soft-cartoon-tile-15.webp"
      as="image"
      type="image/webp"
      fetchpriority="low"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Local dashboard for monitoring tracked-aircraft concurrent-activity anomaly signals."
    />
    <title>Apocalypse Early Warning System</title>
    <style>
      html.initial-loading,
      html.initial-loading body {
        margin: 0;
        min-width: 320px;
        background: rgb(219, 212, 204);
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background: rgb(219, 212, 204);
        opacity: 1;
        transition: opacity 120ms linear;
      }

      #initial-loader.initial-loader-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #initial-loader video {
        display: block;
        width: 128px;
        height: 128px;
      }
    </style>
  </head>
  <body>
    <main id="initial-loader" aria-label="Loading">
      <video src="/animation.mp4" autoplay loop muted playsinline preload="auto" aria-hidden="true"></video>
    </main>
    <div id="root"></div>
    <script type="module">
      const loaderVideo = document.querySelector('#initial-loader video')
      const isEventSignalsRoute =
        window.location.pathname === '/event-signals' || window.location.pathname.startsWith('/event-signals/')
      let appStarted = false

      function removeInitialLoader() {
        const initialLoader = document.getElementById('initial-loader')
        document.documentElement.classList.remove('initial-loading')
        initialLoader?.remove()
      }

      function startApp() {
        if (appStarted) {
          return
        }

        appStarted = true

        if (isEventSignalsRoute) {
          removeInitialLoader()
          import('/src/main.jsx')
          return
        }

        requestAnimationFrame(() => {
          setTimeout(() => import('/src/main.jsx'), 0)
        })
      }

      if (isEventSignalsRoute) {
        startApp()
      } else if (loaderVideo) {
        loaderVideo.addEventListener('loadeddata', startApp, { once: true })
        loaderVideo.addEventListener('error', startApp, { once: true })

        if (loaderVideo.readyState >= 2) {
          startApp()
        }

        setTimeout(startApp, 1200)
      } else {
        startApp()
      }
    </script>
  </body>
</html>
