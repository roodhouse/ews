name: Refresh Live Data

on:
  workflow_dispatch:
  schedule:
    - cron: "5,35 * * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
  TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
  EWS_INTERNAL_ALERT_TOKEN: ${{ secrets.EWS_INTERNAL_ALERT_TOKEN }}
  EWS_INTERNAL_ALERT_URL: https://ews.kylemcdonald.net/api/internal/level5-alert
  EWS_INTERNAL_CLEANUP_URL: https://ews.kylemcdonald.net/api/internal/anonymize-pending-signups
  PUBLIC_BUCKET: ews-public
  STATE_BUCKET: ews-state
  MAIN_DB_PATH: data/ews-main.sqlite
  MILITARY_DB_PATH: data/ews-military.sqlite
  UNTRACKED_DB_PATH: data/ews-untracked.sqlite
  EWS_PUBLIC_URL: https://ews.kylemcdonald.net/
  EWS_RSS_URL: https://ews.kylemcdonald.net/rss.xml
  VITE_DASHBOARD_URL: https://pub-49bb6a6f314c47be9b481c25e5f6ca9e.r2.dev/dashboard.json
  VITE_MILITARY_DASHBOARD_URL: https://pub-49bb6a6f314c47be9b481c25e5f6ca9e.r2.dev/military-dashboard.json
  VITE_UNTRACKED_DASHBOARD_URL: https://pub-49bb6a6f314c47be9b481c25e5f6ca9e.r2.dev/untracked-dashboard.json

concurrency:
  group: refresh-live-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          npm ci
          pip install -r requirements.txt

      - name: Restore main deployment state
        run: |
          mkdir -p data
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object get "${STATE_BUCKET}/ews-main.sqlite" --file "${MAIN_DB_PATH}" --remote; then
              exit 0
            fi
            echo "R2 main restore attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              python3 scripts/import_faa_cohort.py --db "${MAIN_DB_PATH}"
              python3 scripts/import_global_cohort.py --db "${MAIN_DB_PATH}"
              exit 0
            fi
            sleep $((attempt * 15))
          done

      - name: Restore military deployment state
        run: |
          mkdir -p data
          if npx wrangler r2 object get "${STATE_BUCKET}/ews-military.sqlite" --file "${MILITARY_DB_PATH}" --remote; then
            exit 0
          fi
          echo "R2 military state is not available yet; seeding a new deployment DB."
          python3 scripts/import_global_cohort.py --db "${MILITARY_DB_PATH}" --tracked-category military --tracked-source global_military_aircraft

      - name: Restore untracked deployment state
        run: |
          mkdir -p data
          if npx wrangler r2 object get "${STATE_BUCKET}/ews-untracked.sqlite" --file "${UNTRACKED_DB_PATH}" --remote; then
            exit 0
          fi
          echo "R2 untracked state is not available yet; seeding a new deployment DB."
          python3 scripts/track_non_icao_hex.py --db "${UNTRACKED_DB_PATH}" --latest-live --cache-dir data/cache/adsbx_live --replace-live-snapshot

      - name: Refresh latest main heatmap
        run: python3 scripts/update_latest_heatmap.py --db "${MAIN_DB_PATH}"

      - name: Refresh latest military heatmap
        run: python3 scripts/update_latest_heatmap.py --db "${MILITARY_DB_PATH}"

      - name: Refresh latest untracked heatmap
        run: python3 scripts/track_non_icao_hex.py --db "${UNTRACKED_DB_PATH}" --latest-live --cache-dir data/cache/adsbx_live --replace-live-snapshot

      - name: Export published dashboard snapshot
        run: node scripts/export_dashboard_snapshot.js --db "${MAIN_DB_PATH}" --output tmp/dashboard.json --endpoint main --cohort global_business_jet

      - name: Export published military dashboard snapshot
        run: node scripts/export_dashboard_snapshot.js --db "${MILITARY_DB_PATH}" --output tmp/military-dashboard.json --endpoint military --cohort global_military_aircraft

      - name: Export published untracked dashboard snapshot
        run: node scripts/export_dashboard_snapshot.js --db "${UNTRACKED_DB_PATH}" --output tmp/untracked-dashboard.json --endpoint untracked --cohort non_icao_untracked

      - name: Send Telegram emergency alert
        run: EWS_DB_PATH="${MAIN_DB_PATH}" node scripts/send_telegram_alert.js

      - name: Update RSS feed
        id: rss
        run: |
          RSS_RESULT="$(EWS_DB_PATH="${MAIN_DB_PATH}" node scripts/update_rss_feed.js --output tmp/rss.xml)"
          echo "$RSS_RESULT"
          RSS_UPDATED="$(node -e 'const data = JSON.parse(process.argv[1]); process.stdout.write(data.updated ? "true" : "false")' "$RSS_RESULT")"
          echo "updated=${RSS_UPDATED}" >> "$GITHUB_OUTPUT"

      - name: Send SMS and email emergency alert
        run: |
          if [ -z "${EWS_INTERNAL_ALERT_TOKEN}" ]; then
            echo "Skipping SMS/email alert trigger because EWS_INTERNAL_ALERT_TOKEN is not configured."
            exit 0
          fi

          curl -fsS -X POST "${EWS_INTERNAL_ALERT_URL}" \
            -H "Authorization: Bearer ${EWS_INTERNAL_ALERT_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @tmp/dashboard.json

      - name: Anonymize unfinished notification signups
        run: |
          if [ -z "${EWS_INTERNAL_ALERT_TOKEN}" ]; then
            echo "Skipping pending signup anonymization because EWS_INTERNAL_ALERT_TOKEN is not configured."
            exit 0
          fi

          curl -fsS -X POST "${EWS_INTERNAL_CLEANUP_URL}" \
            -H "Authorization: Bearer ${EWS_INTERNAL_ALERT_TOKEN}"

      - name: Upload main deployment state
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${STATE_BUCKET}/ews-main.sqlite" --file "${MAIN_DB_PATH}" --remote; then
              exit 0
            fi
            echo "R2 main state upload attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Upload military deployment state
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${STATE_BUCKET}/ews-military.sqlite" --file "${MILITARY_DB_PATH}" --remote; then
              exit 0
            fi
            echo "R2 military state upload attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Upload untracked deployment state
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${STATE_BUCKET}/ews-untracked.sqlite" --file "${UNTRACKED_DB_PATH}" --remote; then
              exit 0
            fi
            echo "R2 untracked state upload attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Publish RSS feed
        if: steps.rss.outputs.updated == 'true'
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${PUBLIC_BUCKET}/rss.xml" \
              --file tmp/rss.xml \
              --remote \
              --content-type application/rss+xml \
              --cache-control "public, max-age=300"; then
              exit 0
            fi
            echo "R2 RSS publish attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Deploy updated RSS endpoint
        if: steps.rss.outputs.updated == 'true'
        run: |
          npm run build
          cp tmp/rss.xml client/dist/rss.xml
          npx wrangler pages deploy client/dist --project-name apocalypse-ews --branch main --commit-hash "$GITHUB_SHA"

      - name: Publish live snapshot
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${PUBLIC_BUCKET}/dashboard.json" \
              --file tmp/dashboard.json \
              --remote \
              --content-type application/json \
              --cache-control "public, max-age=300"; then
              exit 0
            fi
            echo "R2 snapshot publish attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Publish military live snapshot
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${PUBLIC_BUCKET}/military-dashboard.json" \
              --file tmp/military-dashboard.json \
              --remote \
              --content-type application/json \
              --cache-control "public, max-age=300"; then
              exit 0
            fi
            echo "R2 military snapshot publish attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Publish untracked live snapshot
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${PUBLIC_BUCKET}/untracked-dashboard.json" \
              --file tmp/untracked-dashboard.json \
              --remote \
              --content-type application/json \
              --cache-control "public, max-age=300"; then
              exit 0
            fi
            echo "R2 untracked snapshot publish attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done
