name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - client/**
      - functions/**
      - migrations/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy-pages.yml

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  PUBLIC_BUCKET: ews-public
  EWS_PUBLIC_URL: https://ews.kylemcdonald.net/
  EWS_RSS_URL: https://ews.kylemcdonald.net/rss.xml
  VITE_DASHBOARD_URL: https://pub-49bb6a6f314c47be9b481c25e5f6ca9e.r2.dev/dashboard.json
  VITE_MILITARY_DASHBOARD_URL: https://pub-49bb6a6f314c47be9b481c25e5f6ca9e.r2.dev/military-dashboard.json
  VITE_UNTRACKED_DASHBOARD_URL: https://pub-49bb6a6f314c47be9b481c25e5f6ca9e.r2.dev/untracked-dashboard.json

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply public snapshot CORS
        run: npx wrangler r2 bucket cors set "${PUBLIC_BUCKET}" --file config/r2.public.cors.json

      - name: Restore current RSS feed
        run: |
          mkdir -p tmp
          if npx wrangler r2 object get "${PUBLIC_BUCKET}/rss.xml" --file tmp/current-rss.xml --remote; then
            cp tmp/current-rss.xml client/public/rss.xml
          fi

      - name: Build client
        run: npm run build

      - name: Publish RSS feed backup
        run: |
          npx wrangler r2 object put "${PUBLIC_BUCKET}/rss.xml" \
            --file client/dist/rss.xml \
            --remote \
            --content-type application/rss+xml \
            --cache-control "public, max-age=300"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy client/dist --project-name apocalypse-ews --branch main --commit-hash "$GITHUB_SHA"
